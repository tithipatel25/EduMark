<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMark - Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <span>EduMark</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-link active">Assessments</a>
                <a href="#" class="nav-link">Grades</a>
                <a href="#" class="nav-link">Students</a>
                <button class="btn btn-green">Know More</button>
                <button class="btn btn-teal">Contact Us</button>
                <button class="btn btn-blue">Login</button>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="dashboard-grid">
                <!-- Welcome Section -->
                <div class="card welcome-section">
                    <h1>Welcome, Teachers!</h1>
                    <p>Track student progress with ease.</p>
                    <input type="file" id="fileInput" accept=".txt">
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        Upload Student Data (.txt)
                    </button>
                </div>

                <!-- Assessments Section -->
                <div class="card assessments-section">
                    <h2>Upcoming Assessments</h2>
                    <div class="section-title">Upcoming Assessments</div>
                    
                    <div class="chart-container">
                        <div class="chart">
                            <div class="chart-title">Fastest to poorest</div>
                            <div class="bars">
                                <div class="bar" style="height: 85%;">
                                    <div class="bar-label">A</div>
                                </div>
                                <div class="bar" style="height: 35%;">
                                    <div class="bar-label">B</div>
                                </div>
                                <div class="bar" style="height: 25%;">
                                    <div class="bar-label">C</div>
                                </div>
                            </div>
                        </div>
                        <div class="chart">
                            <div class="chart-title">Recent Grades</div>
                            <div class="bars">
                                <div class="bar" style="height: 45%;">
                                    <div class="bar-label">D</div>
                                </div>
                                <div class="bar" style="height: 65%;">
                                    <div class="bar-label">E</div>
                                </div>
                                <div class="bar" style="height: 95%;">
                                    <div class="bar-label">Doing well</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="card quick-actions">
                    <h2>Quick Actions</h2>
                    <button class="action-btn" onclick="alert('Create New Assessment clicked!')">
                        Create New Assessment
                    </button>
                    <button class="action-btn" onclick="alert('View Reports clicked!')">
                        View Reports
                    </button>
                    <button class="action-btn" onclick="alert('Message Students clicked!')">
                        Email Students
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
        
            if (!file.name.endsWith('.txt')) {
                alert('Please upload a .txt file');
                return;
            }
        
            const formData = new FormData();
            formData.append("file", file);
        
            try {
                const res = await fetch("http://127.0.0.1:8000/api/upload", {
                    method: "POST",
                    body: formData
                });
        
                const data = await res.json();
        
                if (!res.ok) {
                    alert(data.detail || "Upload failed");
                    return;
                }
        
                alert(`Uploaded successfully! ${data.students_count} students added.`);
                console.log(data);
        
            } catch (err) {
                console.error(err);
                alert("Backend not reachable");
            }
        });
    </script>
</body>
</html>
