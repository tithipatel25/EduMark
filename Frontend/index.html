<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMark - Teacher Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <span>EduMark</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-link active">Assessments</a>
                <a href="#" class="nav-link">Grades</a>
                <a href="#" class="nav-link">Students</a>
                <button class="btn btn-green">Know More</button>
                <button class="btn btn-teal">Contact Us</button>
                <button class="btn btn-blue">Login</button>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="dashboard-grid">
                
                <!-- Welcome / Upload Section -->
                <div class="card welcome-section">
                    <h1>Welcome, Teachers!</h1>
                    <p>Track student progress with ease.</p>
                    <input type="file" id="fileInput" accept=".txt" style="display:none;">
                    <button class="upload-btn" id="uploadBtn">
                        Upload Student Data (.txt)
                    </button>
                </div>

                <!-- Middle Section (charts, disappears after upload) -->
                <div class="card assessments-section" id="middleSection">
                    <h2>Upcoming Assessments</h2>
                    <div class="section-title">Upcoming Assessments</div>
                    
                    <div class="chart-container">
                        <div class="chart">
                            <div class="chart-title">Fastest to poorest</div>
                            <div class="bars">
                                <div class="bar" style="height: 85%;">
                                    <div class="bar-label">A</div>
                                </div>
                                <div class="bar" style="height: 35%;">
                                    <div class="bar-label">B</div>
                                </div>
                                <div class="bar" style="height: 25%;">
                                    <div class="bar-label">C</div>
                                </div>
                            </div>
                        </div>
                        <div class="chart">
                            <div class="chart-title">Recent Grades</div>
                            <div class="bars">
                                <div class="bar" style="height: 45%;">
                                    <div class="bar-label">D</div>
                                </div>
                                <div class="bar" style="height: 65%;">
                                    <div class="bar-label">E</div>
                                </div>
                                <div class="bar" style="height: 95%;">
                                    <div class="bar-label">Doing well</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Students Table (hidden initially) -->
                <div id="studentsTable" style="display: none;"></div>

                <!-- Quick Actions -->
                <div class="card quick-actions">
                    <h2>Quick Actions</h2>
                    <button class="action-btn" id="createAssessmentBtn">＋ Create New Assessment</button>
                    <button class="action-btn" id="viewReportsBtn">📝 View Reports</button>
                    <button class="action-btn" id="messageStudentsBtn">📧 Email Students</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </div>
</body>
</html>
